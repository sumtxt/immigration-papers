name: Crawl data

on:
   workflow_dispatch:
     inputs:
       slack:
         description: 'Post results to Slack'
         type: boolean
         default: true
       force:
         description: 'Force run even if data is not updated'
         type: boolean
         default: false
   schedule:
     - cron: "0 5 * * 5"

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: main_folder
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r main_folder/requirements.txt

      - name: Run pipeline
        working-directory: ./main_folder
        run: python main.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          PIPELINE_SLACK: ${{ github.event.inputs.slack || 'true' }}
          PIPELINE_FORCE: ${{ github.event.inputs.force || 'false' }}

      - name: Commit results main branch
        working-directory: ./main_folder
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add . && git commit -m "Data updated"
          git push origin
